<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🌍 Global Time Zone Clock</h1>
            <p class="subtitle">Real-time display across major time zones</p>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search timezone..." 
                    class="search-input"
                >
                <button id="clearSearch" class="clear-btn">✕</button>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="major">Major Cities</button>
                <button class="filter-btn" data-filter="favorites">★ Favorites</button>
            </div>

            <div class="settings">
                <label class="toggle-label">
                    <input type="checkbox" id="format24" checked>
                    <span>24-Hour Format</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="showDate" checked>
                    <span>Show Date</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="showSeconds" checked>
                    <span>Show Seconds</span>
                </label>
            </div>
        </div>

        <!-- Clock Grid -->
        <div class="clock-grid" id="clockGrid">
            <!-- Clocks will be dynamically inserted here -->
        </div>

        <!-- Stats Footer -->
        <footer class="footer">
            <div class="stats">
                <span id="totalClocks">0 timezones</span>
                <span id="currentTime">Updated: --:--:--</span>
            </div>
        </footer>
    </div>

    <!-- Loading Spinner -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Loading timezones...</p>
    </div>

    <script src="utils.js"></script>
    <script src="clock.js"></script>
    <script src="app.js"></script>
</body>
</html>
